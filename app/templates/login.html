<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DSS Smartphone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            padding: 3rem 2rem;
            color: white;
            text-align: center;
        }
        .login-body {
            padding: 3rem 2rem;
            background-color: white;
        }
        .form-control {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(15, 23, 42, 0.1);
            border-color: #cbd5e1;
            background-color: white;
        }
        .btn-primary {
            background-color: #0F172A;
            border-color: #0F172A;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #1e293b;
            border-color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="login-header">
                <div class="mb-3">
                    <i class="bi bi-phone-vibrate text-white fs-1"></i>
                </div>
                <h3 class="fw-bolder mb-1">DSS Smartphone</h3>
                <p class="text-white-50 small mb-0">Decision Support System using AHP-TOPSIS</p>
            </div>
            <div class="login-body">
                <h5 class="fw-bold text-dark mb-4 text-center">Sign In</h5>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label text-muted fw-semibold small">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-semibold small">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Login to System</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
